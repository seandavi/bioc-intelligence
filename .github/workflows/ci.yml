name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install
        run: |
          uv venv --python 3.11
          uv pip install -e '.[dev]'

      - name: Lint
        run: uv run ruff check src tests

      - name: Test
        run: uv run pytest
